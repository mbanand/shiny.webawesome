# Handwritten binding override policy for generated Shiny support.
#
# This file is a maintainer-facing policy input consumed during the generate
# stage. It should contain only intentional override decisions, not discovered
# implementation facts.
#
# Known warning-registry keys are defined in:
#   R/wa_warning_registry.R
#
# Schema:
#   schema_version: 1
#   components:
#     - tag: wa-<component>
#       binding:
#         mode: <none|value|action|semantic|action_with_payload>
#         event: <dom-event-name>
#         events: [<dom-event-name>, ...]             # optional semantic/action_with_payload list
#         value_kind: <property|attribute|custom>     # semantic mode only
#         value_field: <field-or-extractor-key>       # semantic mode only
#         payload_kind: <property|attribute|custom>   # action_with_payload only
#         payload_field: <field-or-extractor-key>     # action_with_payload only
#         js_warning: <warning-registry-key>          # optional, semantic mode
#         wrapper_warning: <warning-registry-key>     # optional, semantic mode
#         rationale: <short maintainer note>
#
# Field rules:
# - `tag` is required and must start with `wa-`.
# - `binding.mode` defaults are not inferred here; every override entry should
#   state the intended mode explicitly.
# - `binding.event` is required for every mode except `none`, unless
#   `binding.events` is supplied for `binding.mode: semantic`.
# - `binding.events` may be used only with `binding.mode: semantic` or
#   `binding.mode: action_with_payload`.
# - `binding.value_kind` and `binding.value_field` are required for
#   `binding.mode: semantic`.
# - `binding.payload_kind` and `binding.payload_field` are required for
#   `binding.mode: action_with_payload`.
# - `binding.js_warning` is optional and should reference a known package
#   runtime warning-registry key for browser-side binding warnings, not
#   arbitrary warning text.
# - `binding.wrapper_warning` is optional and should reference a known package
#   runtime warning-registry key for wrapper-side structural warnings, not
#   arbitrary warning text.
# - `binding.rationale` should briefly explain why metadata alone is not the
#   right source of truth for this binding decision.
#
# Current mode semantics:
# - `none`: explicitly suppress binding support.
# - `value`: use the standard value/checked-style Shiny input model.
# - `action`: use an action-button-style incrementing Shiny input model.
# - `semantic`: subscribe to a semantically meaningful component event and use
#   a configured extractor contract (`property`, `attribute`, or known `custom`
#   extractor key) instead of the default value/checked model.
# - `action_with_payload`: use action-button-style incrementing Shiny input
#   semantics plus a side-channel Shiny payload input derived from the event.
#
# Current semantic extractor keys:
# - `activeSlide` with `value_kind: property` for `wa-carousel`
# - `open` with `value_kind: property` for open-state components
# - `selectedItemIds` with `value_kind: custom` for `wa-tree`
# Current action-with-payload extractor keys:
# - `selectedItemValue` with `payload_kind: custom` for `wa-dropdown`
#
schema_version: 1

components:
  - tag: wa-button
    binding:
      mode: action
      event: click
      rationale: Native click behavior is expected for button-like controls, but upstream metadata does not declare click as a component event for wa-button.
  - tag: wa-dropdown
    binding:
      mode: action_with_payload
      event: wa-select
      payload_kind: custom
      payload_field: selectedItemValue
      rationale: Dropdown selection is action-like and should preserve repeated same-item selections while exposing the selected item's value as a side-channel payload.
  - tag: wa-carousel
    binding:
      mode: semantic
      event: wa-slide-change
      value_kind: property
      value_field: activeSlide
      rationale: Carousel slide changes represent committed component state that can drive Shiny outputs.
  - tag: wa-details
    binding:
      mode: semantic
      events:
        - wa-show
        - wa-hide
      value_kind: property
      value_field: open
      rationale: Details visibility is durable open-state, so the binding should expose committed boolean open state rather than raw lifecycle event names.
  - tag: wa-dialog
    binding:
      mode: semantic
      events:
        - wa-show
        - wa-after-hide
      value_kind: property
      value_field: open
      rationale: Dialog visibility is durable open-state, but close requests are cancelable so the binding should use the earliest non-cancelable lifecycle events and expose committed boolean open state.
  - tag: wa-drawer
    binding:
      mode: semantic
      events:
        - wa-show
        - wa-after-hide
      value_kind: property
      value_field: open
      rationale: Drawer visibility is durable open-state, but close requests are cancelable so the binding should use the earliest non-cancelable lifecycle events and expose committed boolean open state.
  - tag: wa-tab-group
    binding:
      mode: semantic
      event: wa-tab-show
      value_kind: property
      value_field: active
      rationale: Tab groups expose durable active-tab state, so the binding should deliver the committed active panel name rather than raw tab show or hide events.
  - tag: wa-tree
    binding:
      mode: semantic
      event: wa-selection-change
      value_kind: custom
      value_field: selectedItemIds
      js_warning: missing_tree_item_id
      wrapper_warning: missing_tree_item_id
      rationale: Tree selection changes represent committed component state and expose selected item ids to Shiny.
